externalDocs:
  description: ""
  url: ""
info:
  contact:
    name: gossignol
  description: |-
    Native gossignol endpoints (first-run setup, capability
    discovery, friends, activity feed, collaborative playlists and
    synchronized Jam sessions) that complement the Subsonic /
    OpenSubsonic API served under /rest/.

    Authenticated endpoints reuse Subsonic credentials passed as
    query parameters: u (username) plus either p (password) or the
    token pair t (md5(password+salt)) and s (salt), and c (client
    name). Setup and capability endpoints are unauthenticated.
  license:
    name: See repository
  title: gossignol extension API
  version: 1.0.0
openapi: 3.1.0
paths:
  /account:
    get:
      description: Reads (GET) or updates (POST) the authenticated user's own account.
        POST is a partial update — only fields present are changed. Lets a user set
        their display name and email themselves.
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: free-text UI name (empty clears it)'
        in: query
        name: displayName
        schema:
          type: string
      - description: 'POST only: email address (empty clears it)'
        in: query
        name: email
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.AccountResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
      summary: Get or update your account
      tags:
      - users
    post:
      description: Reads (GET) or updates (POST) the authenticated user's own account.
        POST is a partial update — only fields present are changed. Lets a user set
        their display name and email themselves.
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: free-text UI name (empty clears it)'
        in: query
        name: displayName
        schema:
          type: string
      - description: 'POST only: email address (empty clears it)'
        in: query
        name: email
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.AccountResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
      summary: Get or update your account
      tags:
      - users
  /activity:
    get:
      description: Returns activity events visible to the caller, honoring each author's
        privacy setting.
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password (or t+s token auth)
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ActivityResponse'
          description: OK
      summary: Activity feed
      tags:
      - activity
  /admin/cleanup:
    get:
      description: Admin only. GET reports the eviction sweep state; POST with enabled=true|false
        turns the background sweep on or off at runtime (persisted; hot).
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: enable or disable the sweep'
        in: query
        name: enabled
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.CleanupStatusResponse'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Forbidden
      summary: Get or toggle the cleanup sweep
      tags:
      - admin
    post:
      description: Admin only. GET reports the eviction sweep state; POST with enabled=true|false
        turns the background sweep on or off at runtime (persisted; hot).
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: enable or disable the sweep'
        in: query
        name: enabled
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.CleanupStatusResponse'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Forbidden
      summary: Get or toggle the cleanup sweep
      tags:
      - admin
  /admin/cleanup/run:
    post:
      description: Admin only. Runs one eviction pass immediately and returns how
        many provider downloads were removed. Works even when the background sweep
        is disabled.
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.CleanupRunResponse'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Forbidden
      summary: Run the cleanup sweep now
      tags:
      - admin
  /admin/providers:
    get:
      description: 'Admin only. GET lists configured providers; POST creates or updates
        one. A provider is content-neutral: a name, an HTTP endpoint and an opaque
        JSON config. POST applies immediately — an enabled provider is registered
        live, a disabled one is removed.'
      parameters:
      - description: Subsonic username (or Bearer token)
        in: query
        name: u
        required: true
