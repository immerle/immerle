        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password (or t+s token auth)
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Jam session id
        in: query
        name: sessionId
        required: true
        schema:
          type: string
      - description: Current track id
        in: query
        name: currentTrackId
        schema:
          type: string
      - description: Playback position in ms
        in: query
        name: position
        schema:
          type: integer
      - description: playing or paused
        in: query
        name: state
        schema:
          type: string
      - description: Comma-separated track ids
        in: query
        name: trackIds
        schema:
          type: string
