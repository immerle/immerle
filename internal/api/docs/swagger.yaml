  /playlists/collaborators:
    post:
      description: Owner-only. Marks the playlist collaborative and grants edit rights
        to another user.
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password (or t+s token auth)
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Playlist id
        in: query
        name: playlistId
        required: true
        schema:
          type: string
      - description: User to grant edit rights
        in: query
        name: username
