  /setup/init:
    post:
      description: Unauthenticated, one-shot. Creates the initial admin — the only
        way to bootstrap an account (no config/env provisioning). Self-locks once
        any user exists.
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/gossignol.SetupInitRequest'
                description: Initial admin credentials
                summary: body
        description: Initial admin credentials
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.SetupInitResponse'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ValidationErrorResponse'
          description: validation
        "401":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: invalid_setup_token
        "409":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: already_initialized
      summary: Create the first administrator
      tags:
      - setup
  /setup/status:
    get:
      description: Unauthenticated. Reports whether the server still needs its first
        admin and whether a setup token is required.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.SetupStatusResponse'
          description: OK
      summary: First-run setup status
      tags:
      - setup
  /theme:
    get:
      description: Reads (GET) or updates (POST) the caller's per-account theme. Only
        the accent colour is supported for now. POST applies a partial update — omitted
        fields keep their stored value; pass an empty accentColor to clear it.
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: CSS hex colour, e.g. #3b82f6 (empty string clears
          it)'
        in: query
        name: accentColor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ThemeResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
      summary: Get or update the UI theme
      tags:
      - theme
    post:
      description: Reads (GET) or updates (POST) the caller's per-account theme. Only
        the accent colour is supported for now. POST applies a partial update — omitted
        fields keep their stored value; pass an empty accentColor to clear it.
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: 'POST only: CSS hex colour, e.g. #3b82f6 (empty string clears
          it)'
        in: query
        name: accentColor
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ThemeResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
      summary: Get or update the UI theme
      tags:
      - theme
  /tokens:
    get:
      description: Lists the caller's active personal access tokens (no secrets).
      parameters:
      - description: Subsonic username (or use a Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.TokensResponse'
          description: OK
      summary: List API tokens
      tags:
      - tokens
  /tokens/create:
    post:
      description: 'Creates a personal access token scoped to the caller. The secret
        is returned ONCE — store it now. Use it as "Authorization: Bearer <token>"
        or "?apiKey=<token>".'
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Label for the token
        in: query
        name: name
        schema:
          type: string
      - description: Expiry as unix epoch millis (0 = never)
        in: query
        name: expires
        schema:
          type: integer
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.CreateTokenResponse'
          description: Created
      summary: Create an API token
      tags:
      - tokens
  /tokens/revoke:
    post:
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Token id to revoke
        in: query
        name: id
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.OKResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Not Found
      summary: Revoke an API token
      tags:
      - tokens
tags:
- description: First-run provisioning of the initial administrator.
  name: setup
- description: Capability discovery for client apps.
  name: discovery
- description: Friend requests and listing.
  name: friends
- description: Social activity feed (privacy-aware).
  name: activity
- description: Collaborative playlist management.
  name: playlists
- description: Synchronized listening sessions (SSE).
  name: jam
- description: Personal API tokens scoped to the calling user.
  name: tokens
- description: Device sessions (JWT) with a revocation/device registry.
  name: devices
