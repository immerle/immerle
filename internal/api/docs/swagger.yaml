      description: 'Resolves a doubtful/missing/failed import item: downloads a track
        and adds it to the import''s playlist, flipping the item to "matched". With
        no `query`, it validates the flagged candidate as-is; with a `query`, it re-searches
        the content providers with that corrected text and uses the best result.'
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password (or t+s token auth)
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Import item id
        in: query
        name: itemId
        required: true
        schema:
          type: string
      - description: Corrected 'artist title' search (omit to validate the flagged
          candidate)
        in: query
        name: query
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ImportItemResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Not Found
      summary: Validate or modify an import item
      tags:
      - imports
