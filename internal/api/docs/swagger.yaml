  /profile:
    get:
      description: Returns a user's profile — identity, recent activity visible to
        the caller (honoring privacy), and their public playlists. Defaults to the
        caller when username is omitted.
      parameters:
      - description: Subsonic username
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password (or t+s token auth)
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      - description: Target username (defaults to the caller)
        in: query
        name: username
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ProfileResponse'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Not Found
