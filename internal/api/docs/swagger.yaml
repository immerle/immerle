  /admin/settings:
    get:
      description: Admin only. GET returns the current runtime settings (provider
        behaviour, artist avatars, scan cadence, federation) plus whether a restart
        is pending. POST applies a partial update (send a JSON body with the fields
        to change; omitted fields keep their current value). Provider behaviour and
        the scan interval apply immediately (hot reload); avatars, the scan watcher
        and federation only take effect after a restart — when one of those changes,
        the response sets restartRequired=true and lists the pending fields so the
        UI can prompt for a restart.
      parameters:
      - description: Subsonic username (or Bearer token)
        in: query
        name: u
        required: true
        schema:
          type: string
      - description: Subsonic password
        in: query
        name: p
        schema:
          type: string
      - description: Client name
        in: query
        name: c
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/gossignol.RuntimeSettingsDTO'
                description: 'POST: settings fields to change (partial)'
                summary: body
        description: 'POST: settings fields to change (partial)'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.SettingsResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/gossignol.ErrorResponse'
          description: Forbidden
      summary: Get or update runtime settings
      tags:
      - admin
    post:
      description: Admin only. GET returns the current runtime settings (provider
        behaviour, artist avatars, scan cadence, federation) plus whether a restart
        is pending. POST applies a partial update (send a JSON body with the fields
        to change; omitted fields keep their current value). Provider behaviour and
        the scan interval apply immediately (hot reload); avatars, the scan watcher
