name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (saves runner minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Verify OpenAPI spec is up to date
        run: |
          go run github.com/swaggo/swag/v2/cmd/swag@v2.0.0-rc5 init \
            -g doc.go -d internal/api/immerle -o internal/api/docs \
            --ot json,yaml --parseInternal --v3.1
          git diff --exit-code internal/api/docs

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o bin/immerle ./cmd/immerle

  build-cli:
    # Cross-compiles the iml terminal client for every release target. macOS
    # and Windows are pure Go (oto/v3 uses purego there) and cross-compile
    # fine from ubuntu-latest; Linux's audio backend uses cgo + ALSA, so that
    # leg needs a real C toolchain -- linux/arm64 runs on a native arm64
    # runner rather than fighting a cross-toolchain for one job.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64, runner: ubuntu-latest, cgo: "1" }
          - { goos: linux, goarch: arm64, runner: ubuntu-24.04-arm, cgo: "1" }
          - { goos: darwin, goarch: amd64, runner: ubuntu-latest, cgo: "0" }
          - { goos: darwin, goarch: arm64, runner: ubuntu-latest, cgo: "0" }
          - { goos: windows, goarch: amd64, runner: ubuntu-latest, cgo: "0" }
          - { goos: windows, goarch: arm64, runner: ubuntu-latest, cgo: "0" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true

      - name: Install ALSA dev headers
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build iml (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "${{ matrix.goos }}" = "windows" ] && ext=".exe"
          go build -ldflags "-s -w" -o "bin/iml-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" ./cmd/iml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build web bundle
        run: npm run export:web

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - name: govulncheck (Go)
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Trivy (deps + secrets)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
