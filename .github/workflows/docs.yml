name: Docs

on:
  push:
    branches: [main]
    # Only rebuild when the docs or the OpenAPI spec they embed change.
    paths:
      - docs/**
      - internal/api/docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read

# One deploy at a time.
concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json
      - run: npm ci
      # Builds against ../internal/api/docs/swagger.json, so the API
      # reference always matches the handlers in this repo.
      - run: npm run build
      # Push the static build to the org's root Pages repo.
      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          deploy_key: ${{ secrets.DOCS_DEPLOY_KEY }}
          external_repository: immerle/immerle.com
          publish_branch: main
          publish_dir: ./docs/build
