name: Release

# Tag a release to ship: `git tag v1.2.3 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload desktop artifacts
  packages: write # push the image to GHCR

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3 # arm64 emulation
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/immerle
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, flag: "--mac" }
          - { os: windows-latest, flag: "--win" }
          - { os: ubuntu-latest, flag: "--linux" }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci

      - name: Build web bundle
        run: npm run export:web

      # Stamp the installer version from the git tag (strip the leading "v") so
      # filenames match the release instead of package.json's static version.
      - name: Build desktop app
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx electron-builder ${{ matrix.flag }} --publish never \
            -c.extraMetadata.version="$VERSION"
        env:
          # electron-builder fails fast on missing signing certs otherwise.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Attach installers to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ui/release/*.dmg
            ui/release/*.zip
            ui/release/*.exe
            ui/release/*.AppImage
            ui/release/*.deb
