name: ✨ Feature request
description: Suggest an idea for Immerle
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Mention any Subsonic/OpenSubsonic spec relevance.
