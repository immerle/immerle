services:
  immerle:
    # Pulls the prebuilt multi-arch image published on every release.
    # To build from your checkout instead, uncomment `build:` below
    # and run `docker compose up --build`.
    image: ghcr.io/immerle/immerle:latest
    # build:
    #   context: .
    #   args:
    #     VERSION: compose
    ports:
      - "4533:4533"
    environment:
      PORT: "4533"
      DATABASE_DRIVER: "sqlite"
      DATABASE_DSN: "/data/immerle.db"
      LIBRARY_DATA_DIR: "/data"
      LIBRARY_PATHS: "/music"
      # The auth secret is auto-generated and persisted to /data/secret on first
      # run (override with AUTH_SECRET if you must). CORS, device-token TTL,
      # transcoding, the on-demand switch & provider behaviour, avatars, scan
      # cadence/watch and federation are runtime settings managed by an admin via
      # the API (POST /admin/settings) and persisted in the database.
      # By default the first admin is created via the setup API (POST
      # /setup/init) from the web UI. Set to "true" to require the one-time
      # startup token instead.
      AUTH_REQUIRE_SETUP_TOKEN: "false"
      # Uncomment to create the first admin from these instead (no interactive
      # setup step needed) — handy for unattended deployments. Both must be set
      # together; a no-op on restart once an admin already exists.
      # ADMIN_USERNAME: "admin"
      # ADMIN_PASSWORD: "change-me"
      LOG_FORMAT: "json"
    volumes:
      - ./music:/music:ro
      - immerle-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4533/ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Optional Postgres backend for large instances. To use it, set
  # DATABASE_DRIVER=postgres and
  # DATABASE_DSN=postgres://immerle:immerle@postgres:5432/immerle?sslmode=disable
  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: immerle
      POSTGRES_PASSWORD: immerle
      POSTGRES_DB: immerle
    volumes:
      - immerle-pg:/var/lib/postgresql/data

volumes:
  immerle-data:
  immerle-pg:
