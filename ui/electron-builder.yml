appId: com.immerle.app
productName: Immerle
copyright: © Immerle

directories:
  output: release
  buildResources: build

# Override the package.json "main" (which must stay "expo-router/entry" for
# Expo) with the Electron entry point inside the packaged app.
extraMetadata:
  main: electron/main.js

# Ship only the Electron glue + the exported web build. The !node_modules line
# is essential: electron-builder auto-bundles the whole production dependency
# tree (the entire RN/Expo stack, ~205M) otherwise — none of it runs in
# Electron, which serves dist/ over http using only Node built-ins.
files:
  - electron/**/*
  - dist/**/*
  - package.json
  - "!node_modules/**/*"

asar: true

mac:
  category: public.app-category.music
  icon: assets/icon.png
  # ponytail: ad-hoc sign (no paid Apple cert). Stops the "is damaged" Gatekeeper
  # error on Apple Silicon; users still right-click > Open once. Full notarization
  # needs an Apple Developer account.
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]

win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: assets/icon.png
  category: AudioVideo
  target:
    - AppImage
    - deb
